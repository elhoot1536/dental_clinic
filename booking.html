<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد - عيادة د. محمد سويلم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background: #f5f5f5;
            color: #333;
            direction: rtl;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1565c0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #1565c0;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #0d47a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>حجز موعد في عيادة د. محمد سويلم</h1>
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">الاسم الكامل:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="phone">رقم الهاتف:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="email">البريد الإلكتروني:</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="service">نوع الخدمة:</label>
                <select id="service" name="service" required>
                    <option value="">اختر الخدمة</option>
                    <option value="فحص عام">فحص عام</option>
                    <option value="تنظيف الأسنان">تنظيف الأسنان</option>
                    <option value="حشو الأسنان">حشو الأسنان</option>
                    <option value="خلع الأسنان">خلع الأسنان</option>
                    <option value="زراعة الأسنان">زراعة الأسنان</option>
                    <option value="تقويم الأسنان">تقويم الأسنان</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">تاريخ الموعد المفضل:</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="time">وقت الموعد المفضل:</label>
                <input type="time" id="time" name="time" required>
            </div>
            <div class="form-group">
                <label for="notes">ملاحظات إضافية:</label>
                <textarea id="notes" name="notes" rows="4"></textarea>
            </div>
            <button type="submit">إرسال طلب الحجز</button>
        </form>
    </div>
</body>
</html>
